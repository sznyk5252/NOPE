stages:
  - README_SYNC

sync_readme:
  stage: README_SYNC
  image: alpine:latest
  variables:
    TEMPLATE_FILE: "README.tpl.md"
    OUTPUT_FILE: "README.md"
  before_script:
    - apk add --no-cache curl ca-certificates git openssh bash

    - curl -LsSf https://astral.sh/uv/install.sh | env UV_UNMANAGED_INSTALL="/usr/local/bin" sh
    
    - git config --global user.email "ci-bot@example.com"
    - git config --global user.name "README Sync Bot"
    - git config --global --add safe.directory $CI_PROJECT_DIR
  script:
    - uv run jinja2 $TEMPLATE_FILE > $OUTPUT_FILE
    
    - |
      if [ -n "$(git status --porcelain $OUTPUT_FILE)" ]; then
        echo "Wykryto zmiany w README.md, aktualizuję repozytorium..."
        git add $OUTPUT_FILE
        git commit -m "docs: automatyczna synchronizacja README [skip ci]"
        git push "https://project_${CI_PROJECT_ID}_bot:${ACCES_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME}
      else
        echo "README.md jest aktualny. Brak zmian."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "**/*.tpl.md"
        - "**/*.g4"
        - "examples/*"
        - "**/*.yml"