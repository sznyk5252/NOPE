stages:
  - README_SYNC
  - GRAMMAR_UPDATE
  - GRAPH_UPDATE

.sys_image:
  image: alpine:latest
  before_script:
    - apk add --no-cache curl ca-certificates git openssh bash graphviz ttf-freefont
    - curl -LsSf https://astral.sh/uv/install.sh | env UV_UNMANAGED_INSTALL="/usr/local/bin" sh
    - git config --global user.email "ci-bot@example.com"
    - git config --global user.name "README Sync Bot"
    - git config --global --add safe.directory $CI_PROJECT_DIR

sync_readme:
  extends: .sys_image
  stage: README_SYNC
  variables:
    TEMPLATE_FILE: "README.tpl.md"
    OUTPUT_FILE: "README.md"
  script:
    - |
      for tpl_file in $(find . -name "*.tpl.md"); do

        out_file="${tpl_file%.tpl.md}.md"
        echo "⚙️ Przetwarzanie: $tpl_file -> $out_file"
        uv run jinja2 -I ./ "$tpl_file" > "$out_file"
        
        git add "$out_file"
      done
    
    - |
      if [ -n "$(git status --porcelain)" ]; then
        echo "Wykryto zmiany w plikach .md, aktualizuję repozytorium..."
        git commit -m "docs: Automatic sync [skip ci]"
        
        git push -o ci.skip "https://project_${CI_PROJECT_ID}_bot:${ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME}
      else
        echo "Wszystkie dokumenty są aktualne. Brak zmian."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "**/*.tpl.md"
        - "**/*.md"
        - "**/*.g4"
        - "examples/*"
        - "**/*.yml"
        - "**/*.nope"


grammar_update:
  extends: .sys_image
  stage: GRAMMAR_UPDATE
  script:
    - uv run antlr4 -Dlanguage=Python3 -o src NOPE.g4
    - git add src/*
    - git commit -m "Auto compiler sync"
    - git push -o ci.skip "https://project_${CI_PROJECT_ID}_bot:${ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME}
  rules:
      changes:
        - "**/*.g4"
        - "src/*"
        - "**/*.yml"

graph_update:
  extends: .sys_image
  stage: GRAPH_UPDATE
  script:
    - rm graphs/*
    - uv run main.py examples/in/* --no-view
    - git add graphs/*
    - git commit -m "Auto graphs sync"
    - git push -o ci.skip "https://project_${CI_PROJECT_ID}_bot:${ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME}
    
  rules:
      changes:
        - "**/*.g4"
        - "src/*"
        - "**/*.yml"
        - "graphs/*"
